<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Trang Đăng Nhập Demo</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        
        /* TĂNG CHIỀU RỘNG LÊN 500px ĐỂ CANVAS VÀ PUZZLE KHÔNG BỊ BÓP MÉO TỌA ĐỘ */
        .login-box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); width: 500px; text-align: center; }
        
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        
        button { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; transition: 0.3s;}
        button:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Đăng Nhập Hệ Thống</h2>
    <input type="text" placeholder="Tên đăng nhập">
    <input type="password" placeholder="Mật khẩu">
    
    <iframe src="http://127.0.0.1:3000/index_fixed.html" 
            width="100%" 
            height="580" 
            style="border:none; margin-top: 15px; border-radius: 8px;">
    </iframe>

    <button id="loginBtn" disabled>Đăng Nhập</button>
</div>

<script>
    // Lắng nghe tín hiệu từ Iframe Captcha
    window.addEventListener('message', function(event) {
        if (event.data && event.data.type === "CAPTCHA_RESULT") {
            const loginBtn = document.getElementById('loginBtn');
            
            if (event.data.status === "success") {
                // Đã làm mượt lại phần hiển thị thông báo
                loginBtn.innerText = "Đăng Nhập Thành Công!";
                loginBtn.disabled = false;
                loginBtn.style.background = "#28a745"; // Đổi sang màu xanh lá
            } 
            else if (event.data.status === "failed") {
                loginBtn.innerText = "Xác Thực Thất Bại!";
                loginBtn.disabled = true;
                loginBtn.style.background = "#dc3545"; // Đổi sang màu đỏ
                
                // Trả lại trạng thái ban đầu sau 2 giây
                setTimeout(() => {
                    loginBtn.innerText = "Đăng Nhập";
                    loginBtn.style.background = "#ccc";
                }, 2000);
            }
        }
    });
</script>

</body>
</html>
